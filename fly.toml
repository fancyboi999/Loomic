# Fly.io configuration for Loomic API server
# Deploy: fly launch / fly deploy
# Region: nrt (Tokyo) — same as Supabase for low latency

app = "loomic-api"
primary_region = "nrt"

[build]
  dockerfile = "apps/server/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
